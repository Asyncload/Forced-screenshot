name: Build APK (Final Working)

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # 👇 一次性创建所有 gradle wrapper 文件，包括 jar 包
      - name: Full Gradle Wrapper Setup
        run: |
          # 创建目录
          mkdir -p gradle/wrapper

          # 下载 gradle-wrapper.jar（官方原版）
          wget -O gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v7.5.0/gradle/wrapper/gradle-wrapper.jar

          # 写入 gradle-wrapper.properties
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # 写入 gradlew 脚本
          cat > gradlew << 'EOF'
          #!/usr/bin/env sh
          APP_HOME=$(dirname "$0")
          CLASSPATH="$APP_HOME/gradle/wrapper/gradle-wrapper.jar"
          exec java -jar "$CLASSPATH" "$@"
          EOF

          # 给 gradlew 加执行权限
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
