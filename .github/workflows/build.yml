name: Build APK

# 只保留手动触发
on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          sudo apt update
          sudo apt install -y gradle

      - name: Build with Gradle
        run: gradle assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4  # 这里用的是最新的v4版本，不会再报错
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
