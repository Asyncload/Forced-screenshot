# 工作流名字
name: Build APK

# 只保留手动触发
on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest  # 在Ubuntu服务器上编译

    steps:
    # 第一步：下载你的代码
    - uses: actions/checkout@v4

    # 第二步：安装Java环境
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    # 第三步：安装系统自带的Gradle（绕开gradlew）
    - name: Install Gradle
      run: |
        sudo apt update
        sudo apt install -y gradle

    # 第四步：直接用系统Gradle编译APK
    - name: Build with Gradle
      run: gradle assembleRelease

    # 第五步：上传编译好的APK，供你下载
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-screenshot          # 压缩包名字
        path: app/build/outputs/apk/release/*.apk  # APK所在路径      
