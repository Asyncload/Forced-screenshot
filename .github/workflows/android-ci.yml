name: Android CI

on:
  push:
    branches: [ main ] # 改成你的分支名
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Validate Gradle Wrapper # 这一步可以跳过，因为我们不用 gradlew
      run: |
        # 因为没有 gradlew，我们直接使用 gradle 命令
        # 如果你的项目根目录有 build.gradle（没有 wrapper），直接运行下面的
        gradle build

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Android-App
        path: build/libs/ # 或者根据你的项目结构指向 APK 输出目录
